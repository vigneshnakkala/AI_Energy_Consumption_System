<!DOCTYPE html>
<html>
<head>
    <title>Energy AI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- THREE JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            margin:0;
            overflow-x:hidden;
            background:black;
            color:#00f5c4;
            font-family: Arial;
        }

        h1 {
            text-align:center;
            text-shadow:0 0 20px #00f5c4;
            margin-top:20px;
        }

        /* 3D background */
        #bg3d {
            position:fixed;
            top:0;
            left:0;
            z-index:-1;
        }
    </style>
</head>

<body>

<!-- 3D BACKGROUND -->
<div id="bg3d"></div>

<h1>⚡ Energy Consumption Prediction ⚡</h1>

{% block content %}{% endblock %}

<script>
// ================= 3D SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("bg3d").appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0x00f5c4, 2, 100);
light.position.set(0,2,5);
scene.add(light);

// ELECTRIC SPHERE
const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(1, 32, 32),
    new THREE.MeshBasicMaterial({color:0x00f5c4, wireframe:true})
);
scene.add(sphere);

// PARTICLES
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 300;

const posArray = new Float32Array(particlesCount * 3);

for(let i=0;i<particlesCount*3;i++){
    posArray[i] = (Math.random()-0.5)*10;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray,3));

const particlesMaterial = new THREE.PointsMaterial({
    size:0.02,
    color:0x00f5c4
});

const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// LIGHTNING FLASH
function lightning(){
    light.intensity = 5;
    setTimeout(()=> light.intensity = 2, 100);
}
setInterval(lightning, 4000);

// ANIMATION
function animate(){
    requestAnimationFrame(animate);

    sphere.rotation.x += 0.01;
    sphere.rotation.y += 0.01;

    particlesMesh.rotation.y += 0.001;

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
